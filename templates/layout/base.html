{% load i18n %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Brico{% endblock %}</title>
    </head>
    <body>
        <header>
            <nav>
                <a href="{% url 'account_login' %}">{% trans "Sign In" %}</a>
                <a href="{% url 'account_signup' %}">{% trans "Sign On" %}</a>
            </nav>
        </header>
        
        <main>
            <h1>{% trans "Brico" %}</h1>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <a href="">{% trans "Legales Mentions" %}</a>
        </footer>
    </body>
</html>
