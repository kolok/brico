{% extends 'layout/base-logged.html' %}

{% block title %}{% translate "Edit Project - Cosqua" %}{% endblock %}

{% block content %}

        {% csrf_token %}

            {% translate "Save Changes" %}

    </form>
</div>
{% endblock content %}
